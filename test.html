<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback Form with NLP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background-color: #f9f9f9;
    }
    h2 {
      color: #333;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      font-size: 1em;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 1em;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Give Us Your Feedback</h2>
  <form id="feedbackForm">
    <label for="feedback">Your feedback:</label><br>
    <textarea id="feedback" name="feedback" required></textarea><br>
    <button type="submit">Submit</button>
  </form>

  <div id="result" class="result"></div>

  <script>
    // Basic keyword-based sentiment scoring
    const positiveWords = ['good', 'great', 'excellent', 'amazing', 'love', 'nice', 'helpful', 'wonderful', 'fantastic', 'satisfied'];
    const negativeWords = ['bad', 'terrible', 'awful', 'hate', 'poor', 'horrible', 'worst', 'disappointed', 'useless', 'annoyed'];

    function analyzeSentiment(text) {
      let score = 0;
      const words = text.toLowerCase().split(/\W+/);
      words.forEach(word => {
        if (positiveWords.includes(word)) score++;
        if (negativeWords.includes(word)) score--;
      });

      if (score > 1) return 'Positive 😊';
      else if (score < -1) return 'Negative 😞';
      else return 'Neutral 😐';
    }

    document.getElementById('feedbackForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const feedbackText = document.getElementById('feedback').value;
      const sentiment = analyzeSentiment(feedbackText);
      document.getElementById('result').innerText = 'Sentiment: ' + sentiment;
    });
  </script>

</body>
</html>
